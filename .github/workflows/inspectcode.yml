name: ReSharper InspectCode

# Advisory only: runs JetBrains ReSharper command-line InspectCode and uploads the results to GitHub
# code scanning (Security tab + PR annotations). It is intentionally NOT a required status check — it
# complements, and overlaps with, the Roslyn analyzers and CodeQL, so it should inform, not block.
on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

concurrency:
  group: inspectcode-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inspectcode:
    name: Inspect (advisory)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload-sarif publishes to code scanning
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            10.0.x

      - name: Install ReSharper command-line tools
        run: |
          dotnet tool install --global JetBrains.ReSharper.GlobalTools
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # jb inspectcode restores and builds the solution itself, then reports. It returns 0 even when it
      # finds issues, so the job stays green; findings surface in code scanning. --severity=WARNING drops
      # suggestion/hint noise.
      - name: Run InspectCode
        run: jb inspectcode R8.sln --output=resharper.sarif --format=Sarif --severity=WARNING

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: resharper.sarif
          category: resharper-inspectcode
